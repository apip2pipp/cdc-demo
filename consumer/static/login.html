  <style>
    .cyber-grid {
      background-image: 
        linear-gradient(to right, rgba(56, 189, 248, 0.08) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(56, 189, 248, 0.08) 1px, transparent 1px);
      background-size: 60px 60px;
      perspective: 1000px;
    }
    .animated-mesh {
      background: radial-gradient(circle at 50% 50%, rgba(56, 189, 248, 0.1) 0%, transparent 50%),
            radial-gradient(circle at 100% 0%, rgba(192, 193, 255, 0.05) 0%, transparent 40%),
            radial-gradient(circle at 0% 100%, rgba(241, 160, 43, 0.03) 0%, transparent 40%);
      filter: blur(80px);
      animation: pulse-mesh 15s ease-in-out infinite alternate;
    }
    @keyframes pulse-mesh {
      0% { transform: scale(1) translate(0, 0); }
      100% { transform: scale(1.1) translate(2%, 2%); }
    }
    .glass-panel {
      background: rgba(23, 31, 51, 0.7);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(135, 146, 154, 0.2);
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8), 
            inset 0 0 0 1px rgba(255, 255, 255, 0.05);
    }
    .glass-panel:before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(142, 213, 255, 0.4), transparent);
    }
    .brand-glow {
      filter: drop-shadow(0 0 8px rgba(142, 213, 255, 0.6));
    }
    .btn-glow {
      box-shadow: 0 0 20px rgba(56, 189, 248, 0.4);
      transition: all 0.3s ease;
    }
    .btn-glow:hover {
      box-shadow: 0 0 30px rgba(56, 189, 248, 0.6);
      transform: translateY(-1px);
    }
    .input-glow:focus-within {
      box-shadow: 0 0 15px rgba(56, 189, 248, 0.15);
      border-color: rgba(56, 189, 248, 0.5);
    }
    .circuit-line {
      position: absolute;
      background: linear-gradient(90deg, transparent, rgba(56, 189, 248, 0.2), transparent);
      height: 1px;
      width: 100%;
      animation: circuit-slide 8s linear infinite;
    }
    @keyframes circuit-slide {
      0% { transform: translateX(-100%) translateY(0); opacity: 0; }
      20% { opacity: 1; }
      80% { opacity: 1; }
      100% { transform: translateX(100%) translateY(0); opacity: 0; }
    }
    @keyframes shimmer {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(100%); }
    }
  </style>

  <script>
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const errorDiv = document.getElementById('login-error');
      const submitBtn = document.getElementById('submit-btn');
      
      errorDiv.classList.add('hidden');
      submitBtn.disabled = true;
      submitBtn.style.opacity = '0.7';

      try {
        const response = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });

        if (response.ok) {
          window.location.href = '/';
        } else {
          const data = await response.json();
          errorDiv.textContent = data.error || 'Login gagal. Periksa kembali kredensial Anda.';
          errorDiv.classList.remove('hidden');
        }
      } catch (err) {
        errorDiv.textContent = 'Terjadi kesalahan jaringan. Coba lagi.';
        errorDiv.classList.remove('hidden');
      } finally {
        submitBtn.disabled = false;
        submitBtn.style.opacity = '1';
      }
    });
  </script>
</body>
</html>
