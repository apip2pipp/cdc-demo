<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Event Detail — CDC Audit Trail</title>
  <meta name="description" content="Detail payload lengkap CDC event, termasuk data before dan after perubahan." />
  <link rel="stylesheet" href="/assets/style.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔍</text></svg>" />
</head>
<body>

<div class="page-wrapper">

  <!-- ── Header ─────────────────────────────────────────────────────────── -->
  <header class="header">
    <div class="header-brand">
      <div class="header-icon">📋</div>
      <div>
        <div class="header-title">CDC Audit Trail</div>
        <div class="header-subtitle">Event Detail</div>
      </div>
    </div>
  </header>

  <!-- ── Back ───────────────────────────────────────────────────────────── -->
  <a href="/" class="back-btn" id="back-btn">← Back to Dashboard</a>

  <!-- ── Meta card ──────────────────────────────────────────────────────── -->
  <div class="detail-meta glass" id="detail-meta" style="display:none;">
    <div class="detail-meta-header">
      <div>
        <div class="detail-meta-title">Event Detail</div>
        <div class="detail-meta-id" id="detail-id">—</div>
      </div>
      <div id="detail-badge">—</div>
    </div>

    <div class="detail-meta-fields">
      <div>
        <div class="detail-field-label">Table</div>
        <div class="detail-field-value" id="detail-table">—</div>
      </div>
      <div>
        <div class="detail-field-label">Timestamp</div>
        <div class="detail-field-value" id="detail-time">—</div>
      </div>
      <div>
        <div class="detail-field-label">Record ID</div>
        <div class="detail-field-value" id="detail-record">—</div>
      </div>
      <div>
        <div class="detail-field-label">Action</div>
        <div class="detail-field-value" id="detail-action">—</div>
      </div>
    </div>
  </div>

  <!-- ── Before / After diff ────────────────────────────────────────────── -->
  <div class="diff-grid" id="diff-grid" style="display:none;">

    <div class="diff-panel glass">
      <div class="diff-panel-title before">
        <span>⬅</span> Before
      </div>
      <div class="json-block" id="before-json">
        <span class="null-state">null</span>
      </div>
    </div>

    <div class="diff-panel glass">
      <div class="diff-panel-title after">
        <span>➡</span> After
      </div>
      <div class="json-block" id="after-json">
        <span class="null-state">null</span>
      </div>
    </div>

  </div>

  <!-- ── Raw payload ────────────────────────────────────────────────────── -->
  <div class="raw-section glass" id="raw-section" style="display:none;">
    <details>
      <summary class="raw-toggle">
        <span class="raw-chevron">▶</span>
        &nbsp;Raw Debezium Payload
      </summary>
      <div class="raw-content" id="raw-payload">—</div>
    </details>
  </div>

  <!-- ── Error / loading states ────────────────────────────────────────── -->
  <div id="state-loading" style="text-align:center; padding: 80px 20px;">
    <div class="empty-state-icon">⏳</div>
    <p style="color: var(--text-muted);">Loading event detail…</p>
  </div>

  <div id="state-error" style="display:none; text-align:center; padding: 80px 20px;">
    <div class="empty-state-icon">⚠️</div>
    <p style="color: var(--text-muted);" id="error-msg">Event not found.</p>
    <a href="/" style="display:inline-block; margin-top:16px;" class="back-btn">← Back to Dashboard</a>
  </div>

</div><!-- /page-wrapper -->

<script>
/* ── JSON syntax highlighter ─────────────────────────────────────────────── */
function highlight(json) {
  if (!json || json === 'null') {
    return '<span class="null-state">null — no data</span>';
  }
  try {
    const pretty = JSON.stringify(JSON.parse(json), null, 2);
    return pretty
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(
        /("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|true|false|null|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g,
        (match) => {
          if (/^"/.test(match)) {
            return /:$/.test(match)
              ? `<span class="json-key">${match}</span>`
              : `<span class="json-string">${match}</span>`;
          }
          if (/true|false/.test(match)) return `<span class="json-boolean">${match}</span>`;
          if (/null/.test(match))       return `<span class="json-null">${match}</span>`;
          return `<span class="json-number">${match}</span>`;
        }
      );
  } catch (_) {
    return `<span style="color:var(--text-secondary)">${json}</span>`;
  }
}

function actionBadge(action) {
  const a = (action || '').toUpperCase();
  return `<span class="action-badge badge-${a}"><span class="action-badge-dot"></span>${a}</span>`;
}

function formatTime(iso) {
  if (!iso) return '—';
  try {
    return new Date(iso).toLocaleString('id-ID', {
      day: '2-digit', month: 'short', year: 'numeric',
      hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false,
    });
  } catch (_) { return iso; }
}

/* ── Load detail ─────────────────────────────────────────────────────────── */
async function loadDetail() {
  const params = new URLSearchParams(location.search);
  const id = params.get('id');

  if (!id) {
    showError('No event ID provided in URL.');
    return;
  }

  document.title = `Event #${id} — CDC Audit Trail`;

  try {
    const res = await fetch(`/api/audit-logs/${id}`);
    if (res.status === 404) { showError(`Event #${id} not found.`); return; }
    if (!res.ok) { showError('Failed to load event data.'); return; }

    const log = await res.json();
    renderDetail(log);
  } catch (_) {
    showError('Network error. Make sure the dashboard server is running.');
  }
}

function renderDetail(log) {
  // Hide loading, show content
  document.getElementById('state-loading').style.display = 'none';
  document.getElementById('detail-meta').style.display   = 'block';
  document.getElementById('diff-grid').style.display     = 'grid';
  document.getElementById('raw-section').style.display   = 'block';

  // Meta
  document.getElementById('detail-id').textContent     = `#${log.id}`;
  document.getElementById('detail-badge').innerHTML    = actionBadge(log.action);
  document.getElementById('detail-table').textContent  = log.table_name  || '—';
  document.getElementById('detail-time').textContent   = formatTime(log.event_time);
  document.getElementById('detail-record').textContent = log.record_id   || '—';
  document.getElementById('detail-action').textContent = log.action      || '—';

  // Before / After JSON
  document.getElementById('before-json').innerHTML = highlight(log.before_data);
  document.getElementById('after-json').innerHTML  = highlight(log.after_data);

  // Raw payload
  const rawEl = document.getElementById('raw-payload');
  if (log.raw_payload) {
    try {
      rawEl.textContent = JSON.stringify(JSON.parse(log.raw_payload), null, 2);
    } catch (_) {
      rawEl.textContent = log.raw_payload;
    }
  } else {
    rawEl.textContent = '(not available)';
  }
}

function showError(msg) {
  document.getElementById('state-loading').style.display = 'none';
  document.getElementById('state-error').style.display   = 'block';
  document.getElementById('error-msg').textContent = msg;
}

loadDetail();
</script>

</body>
</html>
